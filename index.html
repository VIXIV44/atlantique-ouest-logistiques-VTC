<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantic Ouest Logistics | Officiel</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --aol-vibrant-cyan: #00f2ff;
            --aol-silver: #f0f0f0;
            --aol-deep-space: #000108;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; overflow-x: hidden; scroll-behavior: smooth; 
            color: var(--aol-silver); background-color: var(--aol-deep-space);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.2)), url('fond-spatial.jpg');
            background-attachment: fixed; background-size: cover; background-position: center;
        }

        /* NAVIGATION */
        header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; width: 90%; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--aol-vibrant-cyan);
        }
        
        .nav-brand { font-weight: 900; font-size: 1.1rem; color: white; text-decoration: none; text-transform: uppercase; display: flex; align-items: center; }
        .logo-mini { height: 35px; margin-right: 15px; mix-blend-mode: screen; filter: brightness(1.2); }

        .nav-menu { display: flex; gap: 10px; }
        .nav-link { color: #dcdcdc; text-decoration: none; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 5px 10px; }

        /* HERO */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .logo-central { width: 220px; margin-bottom: 20px; mix-blend-mode: screen; filter: drop-shadow(0 0 20px var(--aol-vibrant-cyan)); }
        h1 { font-size: 4.5rem; font-weight: 900; margin: 0; }
        h1 span { color: var(--aol-vibrant-cyan); text-shadow: 0 0 30px var(--aol-vibrant-cyan); }

        .bio-container { max-width: 700px; background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 12px; border-left: 5px solid var(--aol-vibrant-cyan); }
        .btn-rejoindre { display: inline-block; background: var(--aol-vibrant-cyan); color: #000; padding: 18px 45px; border-radius: 5px; text-decoration: none; font-weight: 900; margin-top: 40px; text-transform: uppercase; }

        /* GALERIE */
        .galerie-sec { padding: 100px 5%; background: rgba(0,0,0,0.8); }
        .galerie-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .img-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .img-item img:hover { transform: scale(1.03); border-color: var(--aol-vibrant-cyan); }

        /* SYSTEME DE ZOOM (SANS JAVASCRIPT) */
        .lightbox {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }
        .lightbox:target { display: flex; }
        .lightbox img { max-width: 90%; max-height: 80%; border: 2px solid var(--aol-vibrant-cyan); box-shadow: 0 0 50px rgba(0, 242, 255, 0.3); }
        .close-zoom { position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-decoration: none; color: transparent; cursor: default; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; text-decoration: none; font-weight: bold; }

        footer { text-align: center; padding: 50px; opacity: 0.6; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
